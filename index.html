<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRP Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=Azeret+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg: #04060b;
    --surface: #080b14;
    --border: #0f1520;
    --border-lit: #161e30;
    --green: #00e87b;
    --green-soft: #00e87b18;
    --green-mid: #00e87b40;
    --red: #ff2952;
    --red-soft: #ff295218;
    --amber: #f0b030;
    --cyan: #3db8f5;
    --text: #c8cee0;
    --text-dim: #3c4560;
    --text-ghost: #1c2235;
  }

  *{margin:0;padding:0;box-sizing:border-box}

  html,body{
    height:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:'Azeret Mono',monospace;
  }

  /* ── Ambient background ── */
  .ambient{
    position:fixed;inset:0;pointer-events:none;z-index:0;
    overflow:hidden;
  }
  .ambient .orb{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.07;
    animation:drift 20s ease-in-out infinite alternate;
  }
  .ambient .orb-1{
    width:600px;height:600px;
    background:var(--green);
    top:-10%;left:-5%;
    animation-duration:25s;
  }
  .ambient .orb-2{
    width:500px;height:500px;
    background:var(--cyan);
    bottom:-15%;right:-8%;
    animation-duration:30s;
    animation-delay:-10s;
  }
  .ambient .orb-3{
    width:350px;height:350px;
    background:var(--amber);
    top:40%;right:20%;
    opacity:0.03;
    animation-duration:22s;
    animation-delay:-5s;
  }

  @keyframes drift{
    0%{transform:translate(0,0) scale(1)}
    100%{transform:translate(40px,30px) scale(1.1)}
  }

  /* ── Noise texture ── */
  .noise{
    position:fixed;inset:0;pointer-events:none;z-index:1;
    opacity:0.025;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px 128px;
  }

  /* ── Main layout ── */
  .dash{
    position:relative;z-index:2;
    display:grid;
    grid-template-rows:auto auto 1fr auto;
    height:100vh;
    padding:20px 28px 12px;
    gap:0;
  }

  /* ── Top bar ── */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-bottom:16px;
    border-bottom:1px solid var(--border);
  }

  .logo{display:flex;align-items:center;gap:12px;}

  .logo-ring{
    width:36px;height:36px;
    border:2px solid var(--green);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Outfit',sans-serif;
    font-weight:900;font-size:15px;
    color:var(--green);
    box-shadow:0 0 20px var(--green-soft),inset 0 0 12px var(--green-soft);
    animation:ring-pulse 4s ease-in-out infinite;
  }
  @keyframes ring-pulse{
    0%,100%{box-shadow:0 0 12px var(--green-soft),inset 0 0 8px var(--green-soft)}
    50%{box-shadow:0 0 28px var(--green-mid),inset 0 0 16px var(--green-soft)}
  }

  .logo-text{
    font-family:'Outfit',sans-serif;
    font-size:22px;font-weight:700;
    letter-spacing:6px;text-transform:uppercase;
  }
  .logo-text em{font-style:normal;color:var(--green);}

  .top-right{
    display:flex;align-items:center;gap:24px;
    font-size:10px;color:var(--text-dim);letter-spacing:1.5px;
  }
  .ws-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--green);box-shadow:0 0 8px var(--green);
    animation:blink 2s ease-in-out infinite;
  }
  .ws-dot.off{background:var(--red);box-shadow:0 0 8px var(--red);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

  .status{display:flex;align-items:center;gap:7px;}

  /* ── Hero price row ── */
  .hero{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    padding:24px 0 18px;
    gap:32px;
    flex-wrap:wrap;
  }

  .hero-left{display:flex;align-items:baseline;gap:20px;flex-shrink:0;}

  .hero-pair{
    font-family:'Outfit',sans-serif;
    font-size:14px;font-weight:500;
    letter-spacing:4px;color:var(--text-dim);
    text-transform:uppercase;
    align-self:center;
    margin-bottom:12px;
  }

  .hero-price{
    font-family:'Outfit',sans-serif;
    font-size:clamp(72px,10vw,140px);
    font-weight:800;
    line-height:0.9;
    letter-spacing:-3px;
    color:var(--green);
    text-shadow:0 0 60px var(--green-soft),0 0 120px #00e87b08;
    transition:color 0.1s,text-shadow 0.1s;
  }
  .hero-price.flash-up{color:#55ffaa;text-shadow:0 0 80px #55ffaa30;}
  .hero-price.flash-dn{color:#ff6080;text-shadow:0 0 80px #ff608030;}

  .hero-unit{
    font-size:clamp(18px,2.5vw,32px);
    font-weight:300;
    color:var(--text-dim);
    letter-spacing:2px;
    margin-left:-8px;
    margin-bottom:8px;
  }

  .hero-change{
    font-family:'Outfit',sans-serif;
    font-size:clamp(16px,2vw,26px);
    font-weight:600;
    padding:6px 16px;
    border-radius:6px;
    margin-bottom:10px;
    letter-spacing:0.5px;
  }
  .hero-change.up{background:var(--green-soft);color:var(--green);}
  .hero-change.dn{background:var(--red-soft);color:var(--red);}
  .hero-change.flat{background:#ffffff06;color:var(--text-dim);}

  /* ── Secondary metrics strip ── */
  .metrics{
    display:flex;
    align-items:center;
    gap:clamp(16px,3vw,48px);
    flex-wrap:wrap;
  }

  .metric{
    display:flex;flex-direction:column;gap:2px;
  }
  .metric .m-label{
    font-size:9px;letter-spacing:2.5px;
    color:var(--text-dim);text-transform:uppercase;
  }
  .metric .m-val{
    font-family:'Outfit',sans-serif;
    font-size:clamp(18px,2.2vw,30px);
    font-weight:600;
    color:var(--text);
    letter-spacing:-0.5px;
  }
  .metric .m-val.green{color:var(--green);}
  .metric .m-val.cyan{color:var(--cyan);}
  .metric .m-val.amber{color:var(--amber);}

  .metric-sep{
    width:1px;height:36px;
    background:var(--border-lit);
    flex-shrink:0;
  }

  /* ── Chart ── */
  .chart-wrap{
    position:relative;
    margin-top:12px;
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    background:var(--surface);
    min-height:0;
  }

  .chart-label{
    position:absolute;top:12px;left:16px;z-index:5;
    font-size:9px;letter-spacing:3px;
    color:var(--text-dim);
    display:flex;align-items:center;gap:8px;
  }
  .chart-label .cl-dot{
    width:5px;height:5px;border-radius:50%;
    background:var(--green);box-shadow:0 0 6px var(--green);
    animation:blink 1.5s ease-in-out infinite;
  }

  #chart{width:100%;height:100%;}

  /* ── Bottom bar ── */
  .bottombar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-top:8px;
    font-size:8px;
    letter-spacing:2px;
    color:var(--text-ghost);
    text-transform:uppercase;
  }
  .bottombar a{color:var(--text-dim);text-decoration:none;}

  /* ── Entry animations ── */
  .topbar,.hero,.chart-wrap,.bottombar{
    opacity:0;
    animation:fadeIn 0.6s ease forwards;
  }
  .topbar{animation-delay:0s}
  .hero{animation-delay:0.08s}
  .chart-wrap{animation-delay:0.16s}
  .bottombar{animation-delay:0.24s}

  @keyframes fadeIn{to{opacity:1}}

  /* ── Responsive (still TV-first) ── */
  @media(max-width:900px){
    .hero{padding:16px 0 12px;}
    .metrics{gap:12px;}
    .metric-sep{display:none;}
    .dash{padding:12px 16px 8px;}
  }
</style>
</head>
<body>

<div class="ambient">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="noise"></div>

<div class="dash">

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-ring">X</div>
      <div class="logo-text"><em>XRP</em> Terminal</div>
    </div>
    <div class="top-right">
      <div class="status"><div class="ws-dot" id="wsD"></div><span id="wsL">CONNECTING</span></div>
      <span id="clock">--:--:--</span>
    </div>
  </div>

  <!-- Hero price + secondary metrics -->
  <div class="hero">
    <div>
      <div class="hero-pair">XRP / USD</div>
      <div class="hero-left">
        <div class="hero-price" id="xP">—</div>
        <div class="hero-unit">USD</div>
        <div class="hero-change flat" id="xChg">—</div>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="m-label">USD / JPY</div>
        <div class="m-val cyan" id="fP">—</div>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <div class="m-label">Brent / JPY</div>
        <div class="m-val amber" id="bP">—</div>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <div class="m-label">XRP / JPY</div>
        <div class="m-val green" id="xJpy">—</div>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <div class="m-label">24H High</div>
        <div class="m-val" id="tHi">—</div>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <div class="m-label">24H Low</div>
        <div class="m-val" id="tLo">—</div>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <div class="m-label">24H Volume</div>
        <div class="m-val" id="tVol">—</div>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <div class="m-label">Mkt Cap</div>
        <div class="m-val" id="tMcap">—</div>
      </div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-wrap">
    <div class="chart-label"><div class="cl-dot"></div>XRP / USDT · 3 MIN · BINANCE</div>
    <div id="chart"></div>
  </div>

  <!-- Bottom -->
  <div class="bottombar">
    <span>XRP TERMINAL — NOT FINANCIAL ADVICE</span>
    <span>CHART: <a href="https://www.tradingview.com/" target="_blank" rel="noopener">TRADINGVIEW</a> LIGHTWEIGHT CHARTS · DATA: BINANCE · FX: OPEN ER-API</span>
  </div>

</div>

<script>
(function(){
  'use strict';

  const S={
    xrpUsd:null,xrpPrev:null,
    usdJpy:null,usdJpyPrev:null,
    brentUsd:null,brentJpy:null,brentJpyPrev:null,
    xrp24hPct:null,xrp24hHi:null,xrp24hLo:null,xrp24hVol:null,
    updCt:0
  };
  const $=id=>document.getElementById(id);
  const fP=(v,d)=>v==null?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
  const fC=v=>{if(v==null)return'—';const n=+v;return n>=1e12?(n/1e12).toFixed(1)+'T':n>=1e9?(n/1e9).toFixed(1)+'B':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':n.toFixed(0);};
  const fT=()=>new Date().toLocaleTimeString('en-US',{hour12:false});

  setInterval(()=>{$('clock').textContent=fT();},1000);

  function flash(el,dir){el.classList.remove('flash-up','flash-dn');void el.offsetWidth;el.classList.add(dir==='up'?'flash-up':'flash-dn');setTimeout(()=>el.classList.remove('flash-up','flash-dn'),200);}

  function setChg(el,pct){
    if(pct==null){el.textContent='—';el.className='hero-change flat';return;}
    const p=+pct;
    const arrow=p>0?'▲':p<0?'▼':'';
    el.textContent=arrow+' '+(p>=0?'+':'')+p.toFixed(2)+'%';
    el.className='hero-change '+(p>0?'up':p<0?'dn':'flat');
  }

  // ──────── Chart ────────
  const chartEl=$('chart');
  const chart=LightweightCharts.createChart(chartEl,{
    layout:{
      background:{type:'solid',color:'#080b14'},
      textColor:'#3c4560',
      fontFamily:'Azeret Mono, monospace',
      fontSize:11,
    },
    grid:{
      vertLines:{color:'#0f152020'},
      horzLines:{color:'#0f152040'},
    },
    crosshair:{
      mode:LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:'#3c456040',width:1,style:2,labelBackgroundColor:'#161e30'},
      horzLine:{color:'#3c456040',width:1,style:2,labelBackgroundColor:'#161e30'},
    },
    rightPriceScale:{borderColor:'#0f1520',scaleMargins:{top:0.05,bottom:0.05}},
    timeScale:{borderColor:'#0f1520',timeVisible:true,secondsVisible:false},
    handleScroll:true,handleScale:true,
  });

  const cSeries=chart.addCandlestickSeries({
    upColor:'#00e87b',downColor:'#ff2952',
    borderUpColor:'#00e87b',borderDownColor:'#ff2952',
    wickUpColor:'#00e87b70',wickDownColor:'#ff295270',
  });

  const vSeries=chart.addHistogramSeries({
    priceFormat:{type:'volume'},
    priceScaleId:'vol',
    scaleMargins:{top:0.88,bottom:0},
  });

  // Fit chart to container
  function fitChart(){
    chart.applyOptions({width:chartEl.clientWidth,height:chartEl.clientHeight});
  }
  new ResizeObserver(fitChart).observe(chartEl);
  fitChart();

  // Load history
  async function loadHistory(){
    try{
      const r=await fetch('https://api.binance.com/api/v3/klines?symbol=XRPUSDT&interval=3m&limit=500');
      const d=await r.json();
      const cs=[],vs=[];
      d.forEach(k=>{
        const t=Math.floor(k[0]/1000),o=+k[1],h=+k[2],l=+k[3],c=+k[4],v=+k[5];
        cs.push({time:t,open:o,high:h,low:l,close:c});
        vs.push({time:t,value:v,color:c>=o?'#00e87b20':'#ff295220'});
      });
      cSeries.setData(cs);
      vSeries.setData(vs);
      chart.timeScale().fitContent();
    }catch(e){console.error('History load error',e);}
  }
  loadHistory();

  // ──────── WebSocket ────────
  function connectWs(){
    const ws=new WebSocket('wss://stream.binance.com:9443/stream?streams=xrpusdt@ticker/xrpusdt@kline_3m');
    ws.onopen=()=>{$('wsD').classList.remove('off');$('wsL').textContent='LIVE';};
    ws.onclose=()=>{$('wsD').classList.add('off');$('wsL').textContent='RECONNECTING';setTimeout(connectWs,3000);};
    ws.onerror=()=>ws.close();
    ws.onmessage=(evt)=>{
      const msg=JSON.parse(evt.data),d=msg.data;
      if(msg.stream==='xrpusdt@ticker'){
        S.xrpPrev=S.xrpUsd;S.xrpUsd=+d.c;
        S.xrp24hPct=+d.P;S.xrp24hHi=+d.h;S.xrp24hLo=+d.l;S.xrp24hVol=+d.q;
        S.updCt++;
        renderXrp();
        computeDerived();
      }
      if(msg.stream==='xrpusdt@kline_3m'){
        const k=d.k;
        const bar={time:Math.floor(k.t/1000),open:+k.o,high:+k.h,low:+k.l,close:+k.c};
        cSeries.update(bar);
        vSeries.update({time:bar.time,value:+k.v,color:bar.close>=bar.open?'#00e87b20':'#ff295220'});
      }
    };
  }

  function renderXrp(){
    const el=$('xP');
    el.textContent=fP(S.xrpUsd,4);
    if(S.xrpPrev!=null) flash(el,S.xrpUsd>=S.xrpPrev?'up':'down');
    setChg($('xChg'),S.xrp24hPct);
    $('tHi').textContent=fP(S.xrp24hHi,4);
    $('tLo').textContent=fP(S.xrp24hLo,4);
    $('tVol').textContent='$'+fC(S.xrp24hVol);
    if(S.xrpUsd)$('tMcap').textContent='$'+fC(S.xrpUsd*61e9);
  }

  function computeDerived(){
    if(S.usdJpy&&S.xrpUsd){
      $('xJpy').textContent='¥'+fP(S.xrpUsd*S.usdJpy,2);
    }
    if(S.brentUsd&&S.usdJpy){
      S.brentJpy=S.brentUsd*S.usdJpy;
      $('bP').textContent='¥'+fP(S.brentJpy,0);
    }
  }

  // ──────── USD/JPY ────────
  async function fetchFx(){
    try{
      const r=await fetch('https://open.er-api.com/v6/latest/USD');
      const d=await r.json();
      if(d.result==='success'&&d.rates?.JPY){
        S.usdJpy=d.rates.JPY;
        $('fP').textContent='¥'+fP(S.usdJpy,2);
        computeDerived();
      }
    }catch(e){}
  }

  // ──────── Brent Crude ────────
  async function fetchBrent(){
    let price=null;
    try{
      const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/BZ=F?interval=1d&range=1d');
      if(r.ok){const d=await r.json();price=d.chart?.result?.[0]?.meta?.regularMarketPrice;}
    }catch(e){}
    if(!price){
      try{
        const r=await fetch('https://api.oilpriceapi.com/v1/prices/latest');
        if(r.ok){const d=await r.json();if(d.status==='success')price=d.data.price;}
      }catch(e){}
    }
    if(price){
      S.brentUsd=price;
      computeDerived();
    }else if(!S.brentUsd){
      // Fallback: prompt once
      $('bP').textContent='—';
      $('bP').style.cursor='pointer';
      $('bP').title='Click to enter Brent price manually';
      $('bP').onclick=function(){
        const v=prompt('Enter Brent Crude USD price (check tradingview.com/symbols/UKOIL):');
        if(v&&!isNaN(+v)){S.brentUsd=+v;computeDerived();this.onclick=null;this.style.cursor='default';}
      };
    }
  }

  // ──────── Init ────────
  connectWs();
  fetchFx();
  fetchBrent();
  setInterval(fetchFx,60000);
  setInterval(fetchBrent,120000);

})();
</script>
</body>
</html>
